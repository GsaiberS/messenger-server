<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мессенджер</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Мессенджер" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══════════════════════════════════════════
     ЭКРАН ВХОДА
══════════════════════════════════════════ -->
<div id="login-screen" class="screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="20" fill="#378ADD"/>
        <path d="M10 14h20M10 20h14M10 26h17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Добро пожаловать</h1>
    <p class="login-sub">Введите инвайт-код, который дал вам друг</p>

    <div id="login-error" class="error-box" style="display:none"></div>

    <div class="field-group">
      <label for="input-name">Ваше имя</label>
      <input id="input-name" type="text" placeholder="Как вас зовут?" maxlength="30" autocomplete="off" />
    </div>

    <div class="field-group">
      <label for="input-code">Инвайт-код</label>
      <input id="input-code" type="text" placeholder="friend-alfa" autocomplete="off" />
    </div>

    <button id="btn-join" class="btn-primary" onclick="doLogin()">Войти</button>

    <p class="login-hint">Нет кода? Попросите у того, кто поднял сервер.</p>
  </div>
</div>

<!-- ══════════════════════════════════════════
     ОСНОВНОЙ ЭКРАН ЧАТА
══════════════════════════════════════════ -->
<div id="chat-screen" class="screen" style="display:none">

  <!-- Боковая панель -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Чат</span>
      <div class="my-avatar-wrap" id="my-avatar-btn" title="Мой профиль">
        <div class="avatar" id="my-avatar-mini"></div>
      </div>
    </div>

    <div class="online-section">
      <div class="section-label">В сети</div>
      <div id="online-list" class="online-list"></div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </aside>

  <!-- Мобильный оверлей для закрытия sidebar -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Основная зона -->
  <main id="main">

    <!-- Шапка чата -->
    <header class="chat-header">
      <button class="burger" onclick="openSidebar()" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
      <div class="header-info">
        <div class="header-title">Общий чат</div>
        <div class="header-sub" id="header-sub">загрузка...</div>
      </div>
      <div id="typing-badge" class="typing-badge" style="display:none"></div>
    </header>

    <!-- Сообщения -->
    <div id="messages" class="messages" role="log" aria-live="polite" aria-label="Сообщения">
      <div class="messages-start">
        <div class="messages-start-icon">💬</div>
        <p>Начало чата</p>
      </div>
    </div>

    <!-- Ввод -->
    <div class="input-area">
      <button class="input-icon-btn" onclick="triggerFileUpload()" title="Прикрепить файл" aria-label="Прикрепить файл">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <input type="file" id="file-input" style="display:none" onchange="sendFile(this)" />

      <div class="input-wrap">
        <textarea
          id="msg-input"
          placeholder="Написать сообщение..."
          rows="1"
          maxlength="4000"
          onkeydown="handleKey(event)"
          oninput="handleInput(this)"
        ></textarea>
      </div>

      <button id="send-btn" class="send-btn" onclick="sendMessage()" aria-label="Отправить">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </div>

  </main>
</div>

<!-- ══════════════════════════════════════════
     УВЕДОМЛЕНИЕ (тост)
══════════════════════════════════════════ -->
<div id="toast" class="toast" role="alert" aria-live="assertive"></div>

<script src="app.js"></script>
</body>
</html>
